name: Disparar Endpoint com Clerk

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  chamar-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar o SDK do Clerk
        run: npm install @clerk/backend

      - name: Gerar Token e Chamar API
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          # Defina o ID do usuário que o robô vai "simular"
          USER_ID: ${{ secrets.CLERK_USER_ID_BOT }} 
        uses: actions/github-script@v7
        with:
          script: |
            const { createClerkClient } = require('@clerk/backend');
            const clerk = createClerkClient({ secretKey: process.env.CLERK_SECRET_KEY });
            
            async function run() {
              // Cria um token válido para o usuário simulando a sessão
              const token = await clerk.tokens.createToken(process.env.USER_ID);
              
              // Faz a chamada HTTP para a sua API enviando o Bearer Token
              const response = await fetch('https://seu-app-no-render.onrender.com/api/v1/sua-rota', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ origem: 'github-actions' })
              });
              
              if (!response.ok) {
                throw new Error(`Erro na API: ${response.statusText}`);
              }
              console.log('API chamada com sucesso!');
            }
            
            return run();